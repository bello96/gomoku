name = "gomoku-worker"
main = "src/index.ts"
compatibility_date = "2024-12-05"
workers_dev = true

routes = [
  { pattern = "gomoku.dengjiabei.cn/api/*", zone_name = "dengjiabei.cn" }
]

[durable_objects]
bindings = [
  { name = "GOMOKU_ROOM", class_name = "GomokuRoom" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GomokuRoom"]
